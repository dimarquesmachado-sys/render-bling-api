<script>
  const API_KEY = "GIRASSOL_ESTOQUE_2026";

  let idProduto = null;
  let codigoProdutoAtual = null;
  const DURACAO_LOGIN_MS = 24 * 60 * 60 * 1000;

  function mostrarToast(msg, tipo) {
    const toast = document.getElementById("toast");
    toast.innerText = msg;
    toast.className = tipo === "ok" ? "toast-ok" : "toast-erro";
    toast.style.display = "block";

    setTimeout(() => {
      toast.style.display = "none";
    }, 2000);
  }

  function tocarSom(tipo) {
    if (tipo === "ok") {
      const som = document.getElementById("somOk");
      if (som) {
        som.currentTime = 0;
        som.play().catch(() => {});
      }
      return;
    }

    if (tipo === "erro") {
      try {
        const AudioCtx = window.AudioContext || window.webkitAudioContext;
        const ctx = new AudioCtx();

        const osc = ctx.createOscillator();
        const gain = ctx.createGain();

        osc.type = "sawtooth";
        osc.frequency.setValueAtTime(260, ctx.currentTime);
        osc.frequency.linearRampToValueAtTime(120, ctx.currentTime + 0.35);

        gain.gain.setValueAtTime(0.001, ctx.currentTime);
        gain.gain.linearRampToValueAtTime(0.5, ctx.currentTime + 0.03);
        gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.38);

        osc.connect(gain);
        gain.connect(ctx.destination);

        osc.start(ctx.currentTime);
        osc.stop(ctx.currentTime + 0.38);
      } catch (e) {
        console.log("Erro ao tocar som de erro:", e);
      }
    }
  }

  function vibrarOk() {
    if (navigator.vibrate) navigator.vibrate([80, 40, 80]);
  }

  function vibrarErro() {
    if (navigator.vibrate) navigator.vibrate([200, 100, 200]);
  }

  function marcarCampoBusca(tipo) {
    const campo = document.getElementById("sku");
    campo.classList.remove("status-busca-ok", "status-busca-erro");

    if (tipo === "ok") {
      campo.classList.add("status-busca-ok");
    }

    if (tipo === "erro") {
      campo.classList.add("status-busca-erro");
    }
  }

  function limparPainelProduto() {
    document.getElementById("nome").innerText = "";
    document.getElementById("codigo").innerText = "";
    document.getElementById("ean").innerText = "";
    document.getElementById("estoque").innerText = "";
    document.getElementById("local").innerText = "";

    const img = document.getElementById("imagem");
    img.src = "";
    img.style.display = "none";

    idProduto = null;
    codigoProdutoAtual = null;
  }

  function limparTudoAposSalvar() {
    document.getElementById("sku").value = "";
    document.getElementById("novoLocal").value = "";
    limparPainelProduto();
    marcarCampoBusca("");
    document.getElementById("sku").focus();
  }

  function salvarSessao(usuario) {
    localStorage.setItem("bling_login", JSON.stringify({
      usuario,
      expiraEm: Date.now() + DURACAO_LOGIN_MS
    }));
  }

  function obterSessao() {
    const bruto = localStorage.getItem("bling_login");
    if (!bruto) return null;

    try {
      const sessao = JSON.parse(bruto);
      if (!sessao.expiraEm || Date.now() > sessao.expiraEm) {
        localStorage.removeItem("bling_login");
        return null;
      }
      return sessao;
    } catch {
      localStorage.removeItem("bling_login");
      return null;
    }
  }

  function aplicarLoginNaTela() {
    document.getElementById("sistema").style.display = "block";
    document.getElementById("loginBox").style.display = "none";
    document.getElementById("tituloPagina").innerText = "GOOD x Localização";
    document.getElementById("btnSairTopo").style.display = "inline-block";
    document.getElementById("sku").focus();
  }

  function sair() {
    localStorage.removeItem("bling_login");
    location.reload();
  }

  function definirTipoSenha(visivel) {
    const campo = document.getElementById("senha");
    const chk = document.getElementById("chkMostrarSenha");
    campo.type = visivel ? "text" : "password";
    chk.checked = visivel;
  }

  function toggleSenha() {
    const campo = document.getElementById("senha");
    definirTipoSenha(campo.type === "password");
  }

  function toggleSenhaPorCheckbox() {
    const chk = document.getElementById("chkMostrarSenha");
    definirTipoSenha(chk.checked);
  }

  async function login() {
    try {
      const usuario = document.getElementById("usuario").value.trim();
      const senha = document.getElementById("senha").value;

      const r = await fetch("/login", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ usuario, senha })
      });

      const d = await r.json().catch(() => ({}));

      if (r.status === 200) {
        salvarSessao(usuario);
        aplicarLoginNaTela();
        mostrarToast("Login realizado com sucesso", "ok");
        tocarSom("ok");
        return;
      }

      tocarSom("erro");
      vibrarErro();
      mostrarToast(d.mensagem || "Usuário ou senha inválidos", "erro");
    } catch (e) {
      tocarSom("erro");
      vibrarErro();
      mostrarToast("Erro no login: " + e.message, "erro");
    }
  }

  async function buscar() {
    const codigoDigitado = document.getElementById("sku").value.trim();

    if (codigoDigitado.length < 2) {
      marcarCampoBusca("erro");
      tocarSom("erro");
      vibrarErro();
      mostrarToast("Digite ao menos 2 caracteres", "erro");
      return;
    }

    limparPainelProduto();
    marcarCampoBusca("");

    let r = await fetch("/buscar?key=" + encodeURIComponent(API_KEY) + "&tipo=SKU&codigo=" + encodeURIComponent(codigoDigitado));
    let d = await r.json();

    if (!d.ok || !d.produto) {
      r = await fetch("/buscar?key=" + encodeURIComponent(API_KEY) + "&tipo=EAN&codigo=" + encodeURIComponent(codigoDigitado));
      d = await r.json();
    }

    if (!d.ok || !d.produto) {
      marcarCampoBusca("erro");
      tocarSom("erro");
      vibrarErro();
      mostrarToast(d.erro || "Produto não encontrado", "erro");
      return;
    }

    marcarCampoBusca("ok");
    tocarSom("ok");

    document.getElementById("nome").innerText = d.produto.nome || "";
    document.getElementById("codigo").innerText = d.produto.codigo || "";
    document.getElementById("ean").innerText = d.produto.ean || "";
    document.getElementById("estoque").innerText = d.produto.estoque ?? "";
    document.getElementById("local").innerText = d.produto.localizacao || "";

    const img = document.getElementById("imagem");
    if (d.produto.imagem) {
      img.src = d.produto.imagem;
      img.style.display = "block";
    } else {
      img.src = "";
      img.style.display = "none";
    }

    idProduto = d.produto.id || null;
    codigoProdutoAtual = d.produto.codigo || null;
    document.getElementById("novoLocal").focus();
  }

  async function salvar() {
    const sku = codigoProdutoAtual || document.getElementById("sku").value.trim();
    const novoLocal = document.getElementById("novoLocal").value.trim();

    if (!sku || sku.length < 2) {
      tocarSom("erro");
      vibrarErro();
      mostrarToast("Busque um produto antes de salvar", "erro");
      return;
    }

    if (!novoLocal) {
      tocarSom("erro");
      vibrarErro();
      mostrarToast("Digite a nova localização", "erro");
      document.getElementById("novoLocal").focus();
      return;
    }

    const r = await fetch("/salvar", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        key: API_KEY,
        codigo: sku,
        novaLocalizacao: novoLocal
      })
    });

    const d = await r.json();

    if (!d.ok) {
      tocarSom("erro");
      vibrarErro();
      mostrarToast(d.erro || "Erro ao salvar", "erro");
      return;
    }

    tocarSom("ok");
    vibrarOk();
    mostrarToast("Salvo com sucesso", "ok");
    limparTudoAposSalvar();
  }

  document.getElementById("sku").addEventListener("input", () => {
    marcarCampoBusca("");
  });

  const sessaoExistente = obterSessao();
  if (sessaoExistente) {
    aplicarLoginNaTela();
  }
</script>
